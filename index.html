<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentax Quiz 題庫系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; }
    header p { color: #94a3b8; margin-top: 0.4rem; font-size: 0.95rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(37,99,235,0.3);
      border-color: #2563eb;
    }

    .card-preview {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      position: relative;
    }
    .card-preview .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .card-body { padding: 1rem 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .card-title { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
    .card-desc { font-size: 0.85rem; color: #94a3b8; flex: 1; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid #334155;
    }
    .card-count { font-size: 0.8rem; color: #64748b; }
    .card-url {
      font-size: 0.72rem;
      color: #475569;
      word-break: break-all;
      background: #0f172a;
      border-radius: 6px;
      padding: 3px 7px;
      font-family: monospace;
    }
    .card-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #34d399;
    }

    .manager-wrap { text-align: center; margin-top: 2rem; }
    .manager-link {
      color: #475569;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .manager-link:hover { color: #94a3b8; }

    .empty { text-align: center; color: #475569; padding: 3rem; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Zentax Quiz</h1>
    <p>點選題組即可開始練習</p>
  </header>

  <div class="grid" id="grid"><p class="empty">載入中…</p></div>
  <div class="manager-wrap" id="mgr-wrap" style="display:none">
    <a class="manager-link" href="題庫管理器.html">⚙️ 題庫管理器</a>
  </div>

  <script>
    const HOST = location.origin + location.pathname.replace(/index\.html$/, '');

    async function fileExists(url) {
      try { return (await fetch(url, { method: 'HEAD' })).ok; }
      catch { return false; }
    }

    function makeCard(set) {
      const url = HOST + set.file;
      const a = document.createElement('a');
      a.className = 'card';
      a.href = set.file;
      a.innerHTML = `
        <div class="card-preview">
          📝
          ${set.price ? `<span class="badge">${set.price}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${set.title || set.file}</div>
          ${set.desc ? `<div class="card-desc">${set.desc}</div>` : ''}
          <div class="card-meta">
            <span class="card-count">${set.count ? `${set.count} 題` : ''}</span>
            <span class="card-price">${set.price || ''}</span>
          </div>
          <div class="card-url">${url}</div>
        </div>`;
      return a;
    }

    async function init() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      // 優先讀 sets.json
      let sets = null;
      try {
        const r = await fetch('sets.json');
        if (r.ok) sets = await r.json();
      } catch {}

      if (sets) {
        // 只顯示檔案真實存在的題組
        for (const set of sets) {
          if (await fileExists(set.file)) {
            grid.appendChild(makeCard(set));
          }
        }
      } else {
        // Fallback：自動偵測 set-01 ~ set-99
        for (let i = 1; i <= 99; i++) {
          const num = String(i).padStart(2, '0');
          const file = `set-${num}.html`;
          if (!(await fileExists(file))) { if (i > 5) break; continue; }
          grid.appendChild(makeCard({ file, title: `題組 ${num}` }));
        }
      }

      if (!grid.children.length) {
        grid.innerHTML = '<p class="empty">尚無題組</p>';
      }

      if (await fileExists('題庫管理器.html')) {
        document.getElementById('mgr-wrap').style.display = '';
      }
    }

    init();
  </script>
</body>
</html>
