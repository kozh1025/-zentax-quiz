<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentax Quiz 題庫系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; }
    header p { color: #94a3b8; margin-top: 0.4rem; font-size: 0.95rem; }

    .list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .row {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      text-decoration: none;
      color: #e2e8f0;
      transition: background 0.15s, border-color 0.15s;
    }
    .row:hover {
      background: #1e3a5f;
      border-color: #2563eb;
    }

    .row-title {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      min-width: 160px;
    }

    .row-url {
      font-family: monospace;
      font-size: 0.82rem;
      color: #64748b;
      flex: 1;
      text-align: right;
      word-break: break-all;
      user-select: all;
    }

    .copy-btn {
      background: #334155;
      border: none;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #2563eb; color: #fff; }
    .copy-btn.copied { background: #16a34a; color: #fff; }

    .manager-wrap { text-align: center; margin-top: 2rem; }
    .manager-link { color: #475569; font-size: 0.85rem; text-decoration: none; }
    .manager-link:hover { color: #94a3b8; }
    .empty { text-align: center; color: #475569; padding: 3rem; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Zentax Quiz</h1>
    <p>點選題組開始練習，或複製連結分享</p>
  </header>

  <div class="list" id="list"><p class="empty">載入中…</p></div>
  <div class="manager-wrap" id="mgr-wrap" style="display:none">
    <a class="manager-link" href="題庫管理器.html">⚙️ 題庫管理器</a>
  </div>

  <script>
    const HOST = location.origin + location.pathname.replace(/index\.html$/, '');

    async function fileExists(url) {
      try { return (await fetch(url, { method: 'HEAD' })).ok; }
      catch { return false; }
    }

    function makeRow(set) {
      const url = HOST + set.file;
      const div = document.createElement('div');
      div.style.display = 'contents';
      div.innerHTML = `
        <a class="row" href="${set.file}">
          <span class="row-title">${set.title || set.file}</span>
          <span class="row-url">${url}</span>
          <button class="copy-btn" data-url="${url}">複製連結</button>
        </a>`;
      div.querySelector('.copy-btn').addEventListener('click', function(e) {
        e.preventDefault();
        navigator.clipboard.writeText(this.dataset.url).then(() => {
          this.textContent = '已複製！';
          this.classList.add('copied');
          setTimeout(() => { this.textContent = '複製連結'; this.classList.remove('copied'); }, 2000);
        });
      });
      return div;
    }

    async function init() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      let sets = null;
      try {
        const r = await fetch('sets.json');
        if (r.ok) sets = await r.json();
      } catch {}

      if (sets) {
        for (const set of sets) {
          if (await fileExists(set.file)) list.appendChild(makeRow(set));
        }
      } else {
        for (let i = 1; i <= 99; i++) {
          const num = String(i).padStart(2, '0');
          const file = `set-${num}.html`;
          if (!(await fileExists(file))) { if (i > 5) break; continue; }
          list.appendChild(makeRow({ file, title: `題組 ${num}` }));
        }
      }

      if (!list.children.length) list.innerHTML = '<p class="empty">尚無題組</p>';

      if (await fileExists('題庫管理器.html')) {
        document.getElementById('mgr-wrap').style.display = '';
      }
    }

    init();
  </script>
</body>
</html>
